name: Node Frontend Checks

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  node-frontend:
    name: Node ${{ matrix.node-version }} frontend checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - '24'
          - '20'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Show Node and npm versions
        run: |
          node --version
          npm --version

      - name: Check supported runtime
        run: npm run check:env

      - name: Install Node dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Check bundle budgets
        run: npm run build:report

      - name: Run unit tests
        run: npm run test:unit
