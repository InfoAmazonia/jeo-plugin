name: Node Frontend Checks

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  node-frontend:
    name: Node 24 frontend checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Show Node and npm versions
        run: |
          node --version
          npm --version

      - name: Check supported runtime
        run: npm run check:env

      - name: Install Node dependencies
        run: npm ci

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: wp-cli

      - name: Build assets
        run: npm run build

      - name: Check bundle budgets
        run: npm run build:report

      - name: Run unit tests
        run: npm run test:unit
